<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Zheng Xiang | AI Solutions & Applied AI Engineer</title>
    <meta
      name="description"
      content="Zheng (Shawn) Xiang - AI solutions, applied AI engineering, and scalable backend systems."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;700&family=Source+Sans+3:wght@400;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <script defer src="./app.js"></script>
  </head>
  <body>
    <div class="noise" aria-hidden="true"></div>
    <header class="topbar">
      <div>
        <p class="eyebrow" id="head-eyebrow"></p>
        <h1 class="name" id="head-name"></h1>
      </div>
      <label class="lang-switch" for="lang-switch">
        <span>EN</span>
        <input id="lang-switch" type="checkbox" aria-label="Language Switch" />
        <span>中</span>
      </label>
    </header>

    <main class="layout">
      <section class="hero panel">
        <p class="hero-tag" id="hero-tag"></p>
        <h2 id="hero-title"></h2>
        <p class="hero-summary" id="hero-summary"></p>
        <div class="cta-row">
          <a
            class="btn btn-primary"
            href="https://linkedin.com/in/zheng-xiang-9830852aa"
            target="_blank"
            rel="noreferrer"
            id="cta-linkedin"
          ></a>
          <button class="btn" id="cta-copy" type="button"></button>
        </div>
        <p class="toast" id="copy-toast" aria-live="polite"></p>
      </section>

      <section class="stats-grid" id="stats-grid"></section>

      <section class="panel">
        <h3 id="focus-title"></h3>
        <p id="focus-body"></p>
      </section>

      <section class="panel">
        <h3 id="narrative-title"></h3>
        <ul class="bullets" id="narrative-list"></ul>
      </section>

      <section class="panel">
        <div class="section-head">
          <h3 id="exp-title"></h3>
          <p id="exp-note"></p>
        </div>
        <div class="timeline" id="exp-list"></div>
      </section>

      <section class="panel">
        <h3 id="project-title"></h3>
        <div class="card-grid" id="project-list"></div>
      </section>

      <section class="panel two-col">
        <div>
          <h3 id="edu-title"></h3>
          <ul class="bullets" id="edu-list"></ul>
        </div>
        <div>
          <h3 id="course-title"></h3>
          <ul class="bullets" id="course-list"></ul>
        </div>
      </section>

      <section class="panel two-col">
        <div>
          <h3 id="skills-title"></h3>
          <div class="skill-groups" id="skills-groups"></div>
        </div>
        <div>
          <h3 id="extra-title"></h3>
          <ul class="bullets" id="extra-list"></ul>
        </div>
      </section>
    </main>
  </body>
</html>
